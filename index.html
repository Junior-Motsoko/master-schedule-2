            /* ── SAVED VIEW ── */
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,padding:"12px 16px",background:"var(--acc-dim)",borderRadius:var_r_sm,border:"1px solid var(--acc)"}}>
                <div style={{fontSize:20}}>✅</div>
                <div style={{fontSize:14,fontWeight:600,color:"var(--acc)"}}>Week reviewed — sharp ntwana!</div>
              </div>
              <div className="list-card">
                <div style={{padding:"14px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>🏆 Biggest Win</div>
                  <div style={{fontSize:15,color:"var(--txt)",lineHeight:1.5}}>{thisReview.win}</div>
                </div>
                {thisReview.skipped&&(
                  <div style={{padding:"14px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>⚠️ What I Skipped</div>
                    <div style={{fontSize:15,color:"var(--txt)",lineHeight:1.5}}>{thisReview.skipped}</div>
                  </div>
                )}
                {thisReview.different&&(
                  <div style={{padding:"14px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>🔄 Do Differently</div>
                    <div style={{fontSize:15,color:"var(--txt)",lineHeight:1.5}}>{thisReview.different}</div>
                  </div>
                )}
                <div style={{padding:"14px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>⚡ Energy</div>
                  <div style={{fontSize:28}}>{energyEmoji(thisReview.energy)}</div>
                </div>
                <div style={{padding:"14px 16px"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>⭐ Week Rating</div>
                  <div style={{fontSize:32,fontWeight:800,color:ratingColor(thisReview.rating)}}>{thisReview.rating}/5</div>
                </div>
              </div>
              <button className="btn btn-ghost" style={{width:"100%",marginTop:10,fontSize:14}} onClick={()=>{setForm({...thisReview,done:false});}}>✏️ Edit this review</button>
            </div>
          ):(
            /* ── FORM ── */
            <div className="list-card">
              {/* Q1 — Biggest win */}
              <div style={{padding:"16px"}}>
                <div style={{fontSize:13,fontWeight:700,color:"var(--txt)",marginBottom:4}}>🏆 Biggest win this week</div>
                <div style={{fontSize:12,color:"var(--txt2)",marginBottom:10}}>One sentence. What went right?</div>
                <textarea value={form.win} onChange={e=>setForm(p=>({...p,win:e.target.value}))}
                  placeholder="e.g. Finished all MAT1512 exercises, didn't skip the 05:00 block once..."
                  style={{minHeight:70,fontSize:14,borderRadius:10,border:"1px solid var(--bdr2)",padding:"10px 12px",width:"100%",background:"var(--sur2)",color:"var(--txt)",resize:"none",outline:"none"}}/>
              </div>

              {/* Q2 — What did you skip */}
              <div style={{padding:"16px",borderTop:"0.5px solid var(--sep)"}}>
                <div style={{fontSize:13,fontWeight:700,color:"var(--txt)",marginBottom:4}}>⚠️ What did you avoid or skip?</div>
                <div style={{fontSize:12,color:"var(--txt2)",marginBottom:10}}>Be honest. No judgment.</div>
                <textarea value={form.skipped} onChange={e=>setForm(p=>({...p,skipped:e.target.value}))}
                  placeholder="e.g. Kept pushing COS1512 to tomorrow, skipped Sunday UNISA session..."
                  style={{minHeight:70,fontSize:14,borderRadius:10,border:"1px solid var(--bdr2)",padding:"10px 12px",width:"100%",background:"var(--sur2)",color:"var(--txt)",resize:"none",outline:"none"}}/>
              </div>

              {/* Q3 — Energy */}
              <div style={{padding:"16px",borderTop:"0.5px solid var(--sep)"}}>
                <div style={{fontSize:13,fontWeight:700,color:"var(--txt)",marginBottom:4}}>⚡ Energy level this week</div>
                <div style={{fontSize:12,color:"var(--txt2)",marginBottom:12}}>How did your body and mind feel overall?</div>
                <EnergyRow val={form.energy} onChange={v=>setForm(p=>({...p,energy:v}))}/>
              </div>

              {/* Q4 — Do differently */}
              <div style={{padding:"16px",borderTop:"0.5px solid var(--sep)"}}>
                <div style={{fontSize:13,fontWeight:700,color:"var(--txt)",marginBottom:4}}>🔄 One thing to do differently next week</div>
                <div style={{fontSize:12,color:"var(--txt2)",marginBottom:10}}>Specific. Actionable. One thing only.</div>
                <textarea value={form.different} onChange={e=>setForm(p=>({...p,different:e.target.value}))}
                  placeholder="e.g. Start MAT1513 by Wednesday instead of leaving it for Sunday..."
                  style={{minHeight:70,fontSize:14,borderRadius:10,border:"1px solid var(--bdr2)",padding:"10px 12px",width:"100%",background:"var(--sur2)",color:"var(--txt)",resize:"none",outline:"none"}}/>
              </div>

              {/* Q5 — Week rating */}
              <div style={{padding:"16px",borderTop:"0.5px solid var(--sep)"}}>
                <div style={{fontSize:13,fontWeight:700,color:"var(--txt)",marginBottom:4}}>⭐ Overall week rating</div>
                <div style={{fontSize:12,color:"var(--txt2)",marginBottom:12}}>Gut feeling. How was this week?</div>
                <StarRow val={form.rating} onChange={v=>setForm(p=>({...p,rating:v}))}/>
                {form.rating>0&&(
                  <div style={{fontSize:13,color:"var(--txt2)",marginTop:8,fontStyle:"italic"}}>
                    {["","Hard week — you survived 💪","Below average — identify the gap","Decent — keep pushing","Good week — build on this 🔥","Outstanding — document what worked 🏆"][form.rating]}
                  </div>
                )}
              </div>

              {/* Save */}
              <div style={{padding:"16px",borderTop:"0.5px solid var(--sep)"}}>
                <button className="btn btn-primary" style={{width:"100%",fontSize:16,padding:"15px"}}
                  onClick={saveForm} disabled={!form.win.trim()||!form.energy||!form.rating}>
                  Save This Week's Review
                </button>
                {(!form.win.trim()||!form.energy||!form.rating)&&(
                  <div style={{fontSize:12,color:"var(--txt3)",textAlign:"center",marginTop:8}}>Fill in win, energy, and rating to save</div>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── HISTORY ── */}
      {view==="history"&&(
        <div>
          {allReviews.length===0?(
            <div style={{padding:"48px 16px",textAlign:"center"}}>
              <div style={{fontSize:48,marginBottom:12}}>📓</div>
              <div style={{fontSize:17,fontWeight:600,marginBottom:6}}>No reviews yet</div>
              <div style={{fontSize:14,color:"var(--txt2)"}}>Complete this week's review first.</div>
            </div>
          ):(
            <>
              {/* Rating chart — simple bar chart */}
              <div className="card card-p" style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--txt2)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14}}>Week Ratings</div>
                <div style={{display:"flex",gap:6,alignItems:"flex-end",height:80}}>
                  {allReviews.slice(0,8).reverse().map(([w,r])=>(
                    <div key={w} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                      <div style={{fontSize:9,fontWeight:700,color:ratingColor(r.rating)}}>{r.rating}</div>
                      <div style={{
                        width:"100%",borderRadius:"4px 4px 0 0",
                        height:`${r.rating/5*64}px`,
                        background:ratingColor(r.rating),
                        transition:"height .4s cubic-bezier(.4,0,.2,1)",
                        minHeight:4,
                      }}/>
                      <div style={{fontSize:8,color:"var(--txt3)",textAlign:"center",lineHeight:1.2}}>
                        {new Date(w+"T00:00:00").toLocaleDateString("en-ZA",{day:"numeric",month:"short"})}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Review cards */}
              {allReviews.map(([w,r])=>(
                <div key={w} className="card card-p" style={{marginBottom:10,borderLeft:`4px solid ${ratingColor(r.rating)}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:"var(--txt2)"}}>{weekLabel(w)}</div>
                      <div style={{fontSize:12,color:"var(--txt3)",marginTop:2}}>{r.blocksDone}/{r.blocksTotal} blocks · {r.blocksPercent}%</div>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <div style={{fontSize:20}}>{energyEmoji(r.energy)}</div>
                      <div style={{fontFamily:"var(--mono)",fontSize:22,fontWeight:800,color:ratingColor(r.rating)}}>{r.rating}<span style={{fontSize:12,opacity:0.5}}>/5</span></div>
                    </div>
                  </div>
                  {r.win&&<div style={{fontSize:13,color:"var(--acc)",fontWeight:500,marginBottom:6}}>🏆 {r.win}</div>}
                  {r.different&&<div style={{fontSize:12,color:"var(--txt2)",fontStyle:"italic"}}>🔄 {r.different}</div>}
                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ── NOTIFICATIONS ENGINE ─────────────────────────────────────────────────────
const REMINDER_DEFS=[
  {id:"wake",    time:"05:00", label:"Wake Up 🌅",        body:"05:00 — time to rise ntwana. UNISA block starts now.",  icon:"🌅"},
  {id:"midday",  time:"12:10", label:"Midday UNISA 📚",   body:"12:10 — campus gap. Open your UNISA notes now.",        icon:"📚"},
  {id:"alx",     time:"18:00", label:"Evening Session 🌆",body:"18:00 — ALX / AWS re/Start block. Close everything else.", icon:"🌍"},
  {id:"late",    time:"20:30", label:"Late Study 🌙",     body:"20:30 — deep study block. Phone down, books open.",     icon:"🌙"},
  {id:"sleep",   time:"23:00", label:"Wind Down 💤",      body:"23:00 — wrap up. Sleep at 23:30. Protect the 05:00.",   icon:"💤"},
  {id:"deadline",time:"08:00", label:"Deadline Check ⚠️", body:"Check your deadlines for today and tomorrow.",          icon:"⚠️"},
];

function scheduleNotifications(prefs,deadlines){
  if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
  // Clear old scheduled notifs from localStorage
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  const lastSched=localStorage.getItem("notif_last_sched");
  if(lastSched===todayStr) return; // already scheduled today
  localStorage.setItem("notif_last_sched",todayStr);

  // Schedule daily reminders via setTimeout
  REMINDER_DEFS.forEach(r=>{
    if(!prefs[r.id]) return;
    const [hh,mm]=r.time.split(":").map(Number);
    const target=new Date();
    target.setHours(hh,mm,0,0);
    const diff=target-now;
    if(diff>0&&diff<86400000){
      setTimeout(()=>{
        try{new Notification(`${r.icon} ${r.label}`,{body:r.body,icon:"./icons/icon-192.png",badge:"./icons/icon-192.png",tag:r.id,renotify:true});}catch(e){}
      },diff);
    }
  });

  // Schedule deadline notifications
  if(prefs.deadlines_24h||prefs.deadlines_day){
    deadlines.filter(d=>!d.done).forEach(dl=>{
      const dlDate=new Date(dl.date+"T08:00:00");
      const daysAway=Math.ceil((dlDate-now)/86400000);
      // Day before
      if(prefs.deadlines_24h&&daysAway===1){
        const t=new Date();t.setHours(8,0,0,0);
        const diff2=t-now;
        if(diff2>0) setTimeout(()=>{
          try{new Notification("⚠️ Deadline Tomorrow",{body:`"${dl.title}" is due tomorrow!`,tag:`dl_${dl.id}_24h`});}catch(e){}
        },diff2);
      }
      // Day of
      if(prefs.deadlines_day&&daysAway===0){
        const t=new Date();t.setHours(8,0,0,0);
        const diff2=t-now;
        if(diff2>0) setTimeout(()=>{
          try{new Notification("🔴 Deadline Today",{body:`"${dl.title}" is due TODAY!`,tag:`dl_${dl.id}_today`});}catch(e){}
        },diff2);
      }
    });
  }
}

function NotifsTab({deadlines}){
  const [perm,setPerm]=useState(()=>typeof Notification!=="undefined"?Notification.permission:"unsupported");
  const [prefs,setPrefs]=useState(()=>LS("notif_prefs_v1")||{
    wake:true,midday:true,alx:true,late:true,sleep:true,deadline:true,
    deadlines_24h:true,deadlines_day:true,
  });
  const [testSent,setTestSent]=useState(false);

  const savePrefs=p=>{setPrefs(p);LSS("notif_prefs_v1",p);};

  const requestPerm=async()=>{
    if(typeof Notification==="undefined"){setPerm("unsupported");return;}
    const result=await Notification.requestPermission();
    setPerm(result);
    if(result==="granted"){
      localStorage.removeItem("notif_last_sched");
      scheduleNotifications(prefs,deadlines);
    }
  };

  const togglePref=k=>{
    const n={...prefs,[k]:!prefs[k]};
    savePrefs(n);
    if(perm==="granted"){
      localStorage.removeItem("notif_last_sched");
      scheduleNotifications(n,deadlines);
    }
  };

  const sendTest=()=>{
    try{
      new Notification("🔔 Test Notification",{body:"Notifications are working! Sharp ntwana 💪",icon:"./icons/icon-192.png"});
      setTestSent(true);setTimeout(()=>setTestSent(false),3000);
    }catch(e){alert("Could not send test — make sure notifications are allowed in your browser settings.");}
  };

  const permColor=p=>p==="granted"?"var(--acc)":p==="denied"?"var(--red)":"var(--gold)";
  const permLabel=p=>p==="granted"?"✅ Allowed":p==="denied"?"❌ Blocked — enable in browser settings":p==="unsupported"?"⚠️ Not supported on this browser":"⏳ Not yet enabled";

  const IosToggle=({on,onChange})=>(
    <label className="ios-toggle" style={{flexShrink:0}}>
      <input type="checkbox" checked={on} onChange={e=>onChange(e.target.checked)}/>
      <div className="toggle-track"/>
      <div className="toggle-thumb"/>
    </label>
  );

  return(
    <div className="fu">
      {/* Header */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:"var(--acc)",marginBottom:4}}>Notifications</div>
        <div style={{fontSize:26,fontWeight:800,letterSpacing:"-0.03em",lineHeight:1}}>Daily Alerts</div>
        <div style={{fontSize:13,color:"var(--txt2)",marginTop:4}}>Local reminders. No server. No account needed.</div>
      </div>

      {/* Permission status */}
      <div className="card card-p" style={{marginBottom:14,borderLeft:`4px solid ${permColor(perm)}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>Notification Permission</div>
            <div style={{fontSize:13,color:permColor(perm),fontWeight:600}}>{permLabel(perm)}</div>
            {perm==="denied"&&<div style={{fontSize:11,color:"var(--txt2)",marginTop:6,lineHeight:1.5}}>Go to your browser settings → Site permissions → Notifications → Allow this site.</div>}
          </div>
          {perm!=="granted"&&perm!=="denied"&&perm!=="unsupported"&&(
            <button className="btn btn-primary btn-sm" onClick={requestPerm} style={{flexShrink:0}}>Enable</button>
          )}
          {perm==="granted"&&(
            <button className="btn btn-ghost btn-sm" onClick={sendTest} style={{flexShrink:0,color:testSent?"var(--acc)":"var(--txt2)"}}>
              {testSent?"Sent! ✅":"Test 🔔"}
            </button>
          )}
        </div>
      </div>

      {perm==="unsupported"&&(
        <div className="card card-p" style={{marginBottom:14,background:"rgba(255,159,10,0.08)",borderColor:"var(--ora)"}}>
          <div style={{fontSize:13,fontWeight:600,color:"var(--ora)",marginBottom:4}}>⚠️ Browser Limitation</div>
          <div style={{fontSize:13,color:"var(--txt2)",lineHeight:1.6}}>Notifications aren't supported on iOS Safari home screen apps yet. Try opening in Chrome on Android, or Chrome/Firefox on desktop.</div>
        </div>
      )}

      {/* Daily reminders */}
      <div style={{fontSize:11,fontWeight:700,color:"var(--txt2)",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 4px 8px"}}>Daily Reminders</div>
      <div className="list-card" style={{marginBottom:14}}>
        {REMINDER_DEFS.map(r=>(
          <div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderBottom:"0.5px solid var(--sep)"}}>
            <div style={{fontSize:24,flexShrink:0}}>{r.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:600}}>{r.label}</div>
              <div style={{fontSize:12,color:"var(--txt2)",marginTop:1}}>{r.time} · {r.body.slice(0,48)}…</div>
            </div>
            <IosToggle on={!!prefs[r.id]} onChange={()=>togglePref(r.id)}/>
          </div>
        ))}
      </div>

      {/* Deadline alerts */}
      <div style={{fontSize:11,fontWeight:700,color:"var(--txt2)",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 4px 8px"}}>Deadline Alerts</div>
      <div className="list-card" style={{marginBottom:14}}>
        {[
          {id:"deadlines_24h",ic:"📬",l:"24h Warning",sub:"Alert the day before a deadline"},
          {id:"deadlines_day", ic:"🔴",l:"Day-of Alert",sub:"Alert on the morning of the deadline"},
        ].map(r=>(
          <div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderBottom:"0.5px solid var(--sep)"}}>
            <div style={{fontSize:24,flexShrink:0}}>{r.ic}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:600}}>{r.l}</div>
              <div style={{fontSize:12,color:"var(--txt2)",marginTop:1}}>{r.sub}</div>
            </div>
            <IosToggle on={!!prefs[r.id]} onChange={()=>togglePref(r.id)}/>
          </div>
        ))}
      </div>

      {/* Upcoming deadlines preview */}
      {deadlines.filter(d=>!d.done).length>0&&(
        <>
          <div style={{fontSize:11,fontWeight:700,color:"var(--txt2)",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 4px 8px"}}>Will Alert For</div>
          <div className="list-card" style={{marginBottom:14}}>
            {deadlines.filter(d=>!d.done).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,5).map(dl=>{
              const days=Math.ceil((new Date(dl.date)-new Date().setHours(0,0,0,0))/86400000);
              return(
                <div key={dl.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600}}>{dl.title}</div>
                    <div style={{fontSize:12,color:"var(--txt2)",marginTop:1}}>{new Date(dl.date+"T00:00:00").toLocaleDateString("en-ZA",{weekday:"short",day:"numeric",month:"short"})}</div>
                  </div>
                  <div style={{fontSize:12,fontWeight:700,color:days<=1?"var(--red)":days<=3?"var(--ora)":days<=7?"var(--gold)":"var(--acc)",flexShrink:0}}>{days===0?"Today":days===1?"Tomorrow":`${days}d`}</div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* How it works */}
      <div className="card card-p" style={{background:"var(--sur2)"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>ℹ️ How this works</div>
        <div style={{fontSize:13,color:"var(--txt2)",lineHeight:1.7}}>
          These are <strong style={{color:"var(--txt)"}}>local notifications</strong> — they fire when you open the app each day. For best results, open the app once in the morning and leave it running in a browser tab. No server, no account, no data leaves your device.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
