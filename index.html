<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#000000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Schedule"/>
<title>Master Schedule</title>
<link rel="manifest" href="./manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ── iOS SYSTEM FONT STACK ── */
:root{
  --sys-font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  --mono:'JetBrains Mono','SF Mono',monospace;

  /* Dark (iOS Dark Mode) */
  --bg:#000000;
  --bg2:#1c1c1e;
  --bg3:#2c2c2e;
  --sur:#1c1c1e;
  --sur2:#2c2c2e;
  --sur3:#3a3a3c;
  --sur-glass:rgba(28,28,30,0.85);
  --bdr:rgba(255,255,255,0.08);
  --bdr2:rgba(255,255,255,0.12);
  --txt:#ffffff;
  --txt2:rgba(255,255,255,0.55);
  --txt3:rgba(255,255,255,0.25);
  --sep:rgba(255,255,255,0.08);
  --acc:#30d158;
  --acc-dim:rgba(48,209,88,0.15);
  --blue:#0a84ff;
  --gold:#ffd60a;
  --red:#ff453a;
  --ora:#ff9f0a;
  --purple:#bf5af2;
  --nav-h:83px;
  --safe-b:env(safe-area-inset-bottom,34px);
  --safe-t:env(safe-area-inset-top,44px);
  --r-xs:8px;--r-sm:12px;--r-md:16px;--r-lg:20px;--r-xl:24px;
}
[data-theme=light]{
  --bg:#f2f2f7;
  --bg2:#ffffff;
  --bg3:#f2f2f7;
  --sur:#ffffff;
  --sur2:#f2f2f7;
  --sur3:#e5e5ea;
  --sur-glass:rgba(255,255,255,0.85);
  --bdr:rgba(0,0,0,0.08);
  --bdr2:rgba(0,0,0,0.12);
  --txt:#000000;
  --txt2:rgba(0,0,0,0.5);
  --txt3:rgba(0,0,0,0.25);
  --sep:rgba(0,0,0,0.08);
  --acc:#34c759;
  --acc-dim:rgba(52,199,89,0.12);
  --blue:#007aff;
  --gold:#ff9500;
  --red:#ff3b30;
  --ora:#ff9500;
  --purple:#af52de;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;-webkit-text-size-adjust:100%;}
body{
  font-family:var(--sys-font);
  background:var(--bg);
  color:var(--txt);
  min-height:100%;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background 0.4s cubic-bezier(0.4,0,0.2,1), color 0.4s cubic-bezier(0.4,0,0.2,1);
}
button,input,textarea{font-family:inherit;-webkit-tap-highlight-color:transparent;outline:none;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{display:none;}

/* ── LAYOUT ── */
#root{
  max-width:430px;
  margin:0 auto;
  padding:calc(var(--safe-t) + 12px) 16px calc(var(--nav-h) + 16px);
  min-height:100vh;
}
@media(min-width:500px){#root{max-width:680px;}}
@media(min-width:800px){#root{max-width:800px;padding-left:24px;padding-right:24px;}}

/* ── NAV BAR (iOS Tab Bar) ── */
#nav-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:var(--sur-glass);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  backdrop-filter:blur(20px) saturate(180%);
  border-top:0.5px solid var(--sep);
  display:flex;
  padding-bottom:var(--safe-b);
  height:var(--nav-h);
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;border:none;background:transparent;
  color:var(--txt3);font-size:10px;font-weight:500;
  cursor:pointer;padding:8px 4px 0;
  transition:color 0.2s,transform 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.nb.on{color:var(--acc);}
.nb:active{transform:scale(0.88);}
.nb .ni{font-size:24px;line-height:1;margin-bottom:2px;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.nb.on .ni{transform:scale(1.12);}
.nb-label{font-size:10px;font-weight:500;}

/* ── SKELETON ── */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skel{
  border-radius:var(--r-sm);
  background:linear-gradient(90deg,var(--sur2) 25%,var(--sur3) 50%,var(--sur2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s ease infinite;
}

/* ── iOS CARDS ── */
.card{
  background:var(--sur);
  border-radius:var(--r-lg);
  margin-bottom:8px;
  overflow:hidden;
  /* iOS-style shadow */
  box-shadow:0 2px 12px rgba(0,0,0,0.15),0 0 0 0.5px var(--bdr);
  transition:background 0.4s,box-shadow 0.4s;
}
[data-theme=light] .card{box-shadow:0 2px 12px rgba(0,0,0,0.08),0 0 0 0.5px var(--bdr);}
.card-p{padding:16px;}
.card-p-sm{padding:12px 16px;}

/* ── iOS GROUPED LIST ── */
.list-card{background:var(--sur);border-radius:var(--r-lg);margin-bottom:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.15),0 0 0 0.5px var(--bdr);}
[data-theme=light] .list-card{box-shadow:0 2px 12px rgba(0,0,0,0.08),0 0 0 0.5px var(--bdr);}
.list-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid var(--sep);cursor:pointer;transition:background 0.15s;-webkit-tap-highlight-color:transparent;}
.list-row:last-child{border-bottom:none;}
.list-row:active{background:var(--sur2);}

/* ── iOS SECTION HEADER ── */
.ios-section{font-size:13px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:0.04em;padding:0 4px;margin:20px 0 6px;}

/* ── PROGRESS RING ── */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.ring-label{position:absolute;text-align:center;}

/* ── iOS SEGMENTED CONTROL ── */
.seg-ctrl{
  display:flex;background:var(--sur2);border-radius:var(--r-sm);padding:2px;
  gap:0;overflow-x:auto;
}
.seg-ctrl::-webkit-scrollbar{display:none;}
.seg-btn{
  flex:1;min-width:52px;padding:6px 12px;border:none;background:transparent;
  font-family:var(--sys-font);font-size:13px;font-weight:500;color:var(--txt2);
  border-radius:calc(var(--r-sm) - 2px);cursor:pointer;white-space:nowrap;
  transition:all 0.2s cubic-bezier(0.4,0,0.2,1);
  -webkit-tap-highlight-color:transparent;
}
.seg-btn.on{
  background:var(--sur);color:var(--txt);font-weight:600;
  box-shadow:0 1px 4px rgba(0,0,0,0.2),0 0 0 0.5px rgba(0,0,0,0.05);
}
[data-theme=light] .seg-btn.on{box-shadow:0 1px 4px rgba(0,0,0,0.1),0 0 0 0.5px rgba(0,0,0,0.04);}

/* ── iOS TOGGLE SWITCH ── */
.toggle-wrap{display:flex;align-items:center;gap:10px;}
.ios-toggle{position:relative;width:51px;height:31px;cursor:pointer;flex-shrink:0;}
.ios-toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{
  position:absolute;inset:0;border-radius:15.5px;
  background:var(--sur3);transition:background 0.3s cubic-bezier(0.4,0,0.2,1);
}
.ios-toggle input:checked+.toggle-track{background:var(--acc);}
.toggle-thumb{
  position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;
  background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.3),0 0 0 0.5px rgba(0,0,0,0.08);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.ios-toggle input:checked~.toggle-thumb{transform:translateX(20px);}

/* ── PROGRESS BAR ── */
.pbar{height:4px;border-radius:99px;background:var(--sur3);overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);}

/* ── TIMELINE ── */
.tl-row{
  display:flex;gap:12px;align-items:flex-start;
  padding:13px 16px;border-bottom:0.5px solid var(--sep);
  cursor:pointer;transition:background 0.12s;
  -webkit-tap-highlight-color:transparent;position:relative;
}
.tl-row:last-child{border-bottom:none;}
.tl-row:active{background:var(--sur2);}
.tl-time{font-family:var(--mono);font-size:11px;color:var(--txt3);min-width:42px;padding-top:2px;flex-shrink:0;}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;border:2px solid;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);}
.tl-body{flex:1;min-width:0;}
.tl-name{font-size:15px;font-weight:500;transition:all 0.2s;}
.tl-sub{font-size:13px;color:var(--txt2);margin-top:1px;}
.tl-done .tl-name{text-decoration:line-through;color:var(--txt3);}
.tl-done .tl-dot{background:transparent!important;border-color:var(--txt3)!important;opacity:0.3;}
.tl-check{font-size:20px;flex-shrink:0;padding-top:0;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);}

/* ── TICK ANIMATION ── */
@keyframes tickPop{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
.tick-anim{animation:tickPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;}

/* ── CHECKLIST ITEM ── */
.ci{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:0.5px solid var(--sep);
  cursor:pointer;transition:background 0.12s;
  -webkit-tap-highlight-color:transparent;
}
.ci:last-child{border-bottom:none;}
.ci:active{background:var(--sur2);}
.ci.done{opacity:0.4;}
.ci.done .ci-lbl{text-decoration:line-through;}
.ci-check{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;border:2px solid var(--sur3);transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);}
.ci-check.on{border:none;transform:scale(1.1);}
.ci-lbl{font-size:15px;font-weight:400;flex:1;}
.ci-num{font-family:var(--mono);font-size:11px;color:var(--txt3);flex-shrink:0;}

/* ── COUNTDOWN ── */
.cd-num{font-family:var(--mono);font-size:48px;font-weight:700;line-height:1;letter-spacing:-0.03em;}

/* ── SCHEDULE TABLE ── */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r-lg);box-shadow:0 4px 24px rgba(0,0,0,0.25),0 0 0 0.5px var(--bdr);}
[data-theme=light] .tbl-scroll{box-shadow:0 4px 24px rgba(0,0,0,0.1),0 0 0 0.5px var(--bdr);}
.stbl{width:100%;border-collapse:collapse;min-width:540px;background:var(--sur);}
.stbl th{
  padding:12px 6px;font-size:12px;font-weight:800;text-align:center;
  color:var(--txt2);background:var(--sur);
  border-bottom:2px solid var(--bdr2);
  letter-spacing:0.06em;text-transform:uppercase;
  position:sticky;top:0;z-index:2;
}
.stbl th:first-child{text-align:left;padding-left:14px;position:sticky;left:0;z-index:3;background:var(--sur);}
.stbl td{padding:3px;text-align:center;vertical-align:middle;min-width:72px;border-bottom:1px solid var(--bdr);}
.stbl td:first-child{position:sticky;left:0;background:var(--bg2);z-index:1;padding-left:10px;text-align:left;min-width:52px;}
.stbl tr:last-child td{border-bottom:none;}
.stbl tr:hover td:not(:first-child){background:var(--sur2);}
.sec-hdr td{
  padding:9px 14px!important;font-size:11px;font-weight:800;
  color:var(--acc);background:var(--bg2)!important;
  border-bottom:1px solid var(--bdr2)!important;
  border-top:2px solid var(--bdr2)!important;
  cursor:pointer;user-select:none;letter-spacing:0.1em;text-transform:uppercase;
  position:sticky;left:0;
}
.scel{
  margin:3px;padding:7px 5px;border-radius:var(--r-xs);
  cursor:pointer;transition:transform 0.12s,opacity 0.12s;
  border-left:4px solid;
}
.scel:active{transform:scale(0.93);opacity:0.7;}
.scel-lbl{font-size:10px;font-weight:700;line-height:1.35;}

/* ── STAR BODY ── */
.star-body{padding:12px 16px;background:var(--sur2);font-size:13px;color:var(--txt2);line-height:1.6;border-top:0.5px solid var(--sep);}
textarea{
  width:100%;background:var(--sur2);color:var(--txt);
  border:none;border-radius:var(--r-sm);padding:10px 12px;
  font-size:14px;line-height:1.5;resize:vertical;min-height:100px;margin-top:8px;
  -webkit-appearance:none;
}
textarea:focus{outline:2px solid var(--acc);outline-offset:2px;}

/* ── PILL ── */
.pill{display:inline-flex;align-items:center;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:600;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;font-weight:600;font-size:15px;border-radius:var(--r-sm);padding:10px 20px;border:none;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(0.96);}
.btn-primary{background:var(--acc);color:#fff;}
.btn-ghost{background:var(--sur2);color:var(--txt);}
.btn-sm{font-size:13px;padding:7px 14px;border-radius:var(--r-xs);}
.btn-xs{font-size:12px;padding:5px 11px;border-radius:var(--r-xs);}
.btn-danger{background:rgba(255,69,58,0.12);color:var(--red);}

/* ── HERO CARD ── */
.hero{
  background:linear-gradient(145deg,var(--acc3,#0a5c2c),var(--bg2));
  border-radius:var(--r-xl);padding:24px;margin-bottom:12px;
  position:relative;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
}
[data-theme=light] .hero{box-shadow:0 4px 24px rgba(0,0,0,0.1);}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:var(--acc);opacity:0.07;border-radius:50%;}

/* ── CHIP ROW ── */
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
.chip{display:flex;flex-direction:column;align-items:center;background:var(--sur);border-radius:var(--r-md);padding:12px 16px;min-width:66px;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,0.12),0 0 0 0.5px var(--bdr);}
[data-theme=light] .chip{box-shadow:0 1px 6px rgba(0,0,0,0.06),0 0 0 0.5px var(--bdr);}
.chip-n{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;}
.chip-l{font-size:9px;font-weight:600;letter-spacing:0.06em;color:var(--txt2);margin-top:3px;text-transform:uppercase;}

/* ── FADE ANIMATION ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp 0.28s cubic-bezier(0.4,0,0.2,1) both;}

/* ── FILTER STRIP ── */
.filter-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.fbtn{font-size:13px;font-weight:500;padding:6px 16px;border-radius:99px;border:none;background:var(--sur2);color:var(--txt2);cursor:pointer;transition:all 0.18s;-webkit-tap-highlight-color:transparent;}
.fbtn:active{transform:scale(0.94);}
.fbtn.on{background:var(--acc);color:#fff;}

/* ── MOD CARD ── */
.mcard{padding:14px 16px;border-bottom:0.5px solid var(--sep);display:flex;flex-direction:column;gap:6px;}
.mcard:last-child{border-bottom:none;}

/* ── THEME TRANSITION ── */
*{transition:background-color 0.35s cubic-bezier(0.4,0,0.2,1),border-color 0.35s,box-shadow 0.35s;}
.tl-dot,.tl-check,.pbar-fill,.ci-check{transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1)!important;}

/* ── PRINT ── */
@media print{#nav-bar,.np{display:none!important}#root{padding-bottom:0}}
</style>
</head>

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [loading,setLoading]=useState(true);
  const [theme,setTheme]=useState(()=>localStorage.getItem("th")||"dark");
  const [tab,setTab]=useState("today");
  const [era,setEra]=useState("NOW");
  const [filter,setFilter]=useState("ALL");
  const [checked,setChecked]=useState(()=>LS("sv5"));
  const [coll,setColl]=useState({SLEEP:true,BREAK:false});
  const [di,setDi]=useState(()=>{const d=new Date().getDay();return d===0?6:d-1;});
  const [justTicked,setJustTicked]=useState(null);

  // Skeleton on mount
  useEffect(()=>{const t=setTimeout(()=>setLoading(false),900);return()=>clearTimeout(t);},[]);

  // Schedule notifications on load
  useEffect(()=>{
    if(!loading){
      const prefs=LS("notif_prefs_v1")||{wake:true,midday:true,alx:true,late:true,sleep:true,deadline:true,deadlines_24h:true,deadlines_day:true};
      const deadlines=Object.values(LS("deadlines_v1"));
      scheduleNotifications(prefs,deadlines);
    }
  },[loading]);

  useEffect(()=>{
    document.body.setAttribute("data-theme",theme);
    document.querySelector('meta[name=theme-color]').setAttribute('content',theme==="dark"?"#000000":"#f2f2f7");
    localStorage.setItem("th",theme);
  },[theme]);

  const slots=era==="NOW"?SLOTS:SLOTS_AWS;
  const wk=useMemo(()=>{const d=new Date();d.setDate(d.getDate()-((d.getDay()+6)%7));return d.toISOString().slice(0,10);},[]);
  const ck=(t,d)=>`${wk}_${t}_${d}`;

  const tog=useCallback(k=>{
    setChecked(p=>{const n={...p,[k]:!p[k]};LSS("sv5",n);return n;});
    setJustTicked(k);
    setTimeout(()=>setJustTicked(null),400);
    if(navigator.vibrate)navigator.vibrate(40);
  },[]);

  const reset=()=>{if(confirm("Reset all ticks for this week?")){{LSS("sv5",{});setChecked({});}}}

  const hrs=useMemo(()=>{const h={ECP:0,UNISA:0,ALX:0,AWS:0,CERT:0,AMAZON:0};slots.forEach(s=>{if(s.sec==="SLEEP")return;DAYS.forEach(d=>{const p=BM[s[d]?.type]?.p;if(p&&h[p]!==undefined)h[p]++;});});return h;},[slots]);
  const mhrs=useMemo(()=>{const h={};UMODS.forEach(m=>{h[m.id]=0;});slots.forEach(s=>{if(s.sec==="SLEEP")return;DAYS.forEach(d=>{const t=s[d]?.type;if(t&&h[t]!==undefined)h[t]++;});});return h;},[slots]);

  const dd=DAYS[di];
  const tblocks=useMemo(()=>slots.filter(s=>s[dd]&&!LIFE.has(s[dd].type)&&s.sec!=="SLEEP").map(s=>({time:s.time,...s[dd],k:ck(s.time,dd)})),[slots,dd,wk]);
  const done=tblocks.filter(b=>checked[b.k]).length;
  const pct=tblocks.length?Math.round(done/tblocks.length*100):0;
  const isVis=t=>filter==="ALL"||BM[t]?.p===filter||LIFE.has(t);
  const rows=useMemo(()=>{const o=[];let last=null;slots.forEach(s=>{if(s.sec!==last){o.push({type:"sec",sec:s.sec});last=s.sec;}o.push({type:"slot",slot:s});});return o;},[slots]);
  const tot=Object.values(hrs).reduce((a,b)=>a+b,0);
  const uc=d=>d<=14?"var(--red)":d<=30?"var(--ora)":d<=60?"var(--gold)":"var(--acc)";
  const pctCol=p=>p===100?"var(--acc)":p>=60?"var(--gold)":"var(--red)";

  const TABS=[{k:"today",i:"📌",l:"Today"},{k:"schedule",i:"📅",l:"Schedule"},{k:"amazon",i:"📦",l:"Amazon"},{k:"exams",i:"⏳",l:"Exams"},{k:"deadlines",i:"📋",l:"Deadlines"},{k:"pipeline",i:"🚀",l:"Pipeline"},{k:"review",i:"📓",l:"Review"},{k:"notifs",i:"🔔",l:"Alerts"}];

  if(loading) return <Skeleton/>;

  return(
    <div>
      {/* ── HEADER ── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:"var(--acc)",marginBottom:4,letterSpacing:0.02}}>Master Schedule</div>
          <div style={{fontSize:28,fontWeight:700,letterSpacing:"-0.03em",lineHeight:1}}>{DAYF[di]}</div>
          <div style={{fontSize:13,color:"var(--txt2)",marginTop:4}}>{new Date().toLocaleDateString("en-ZA",{weekday:"short",day:"numeric",month:"short"})}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {/* iOS Toggle */}
          <label className="ios-toggle" title="Toggle theme">
            <input type="checkbox" checked={theme==="light"} onChange={e=>setTheme(e.target.checked?"light":"dark")}/>
            <div className="toggle-track"/>
            <div className="toggle-thumb"/>
          </label>
          <button className="btn btn-ghost btn-sm" onClick={()=>setEra(e=>e==="NOW"?"AWS":"NOW")} style={{fontSize:13}}>{era==="NOW"?"Now":"AWS"}</button>
          <button className="btn btn-danger btn-sm" onClick={reset} style={{fontSize:13}}>↺</button>
        </div>
      </div>

      {/* ── STAT CHIPS ── */}
      <div className="chips" style={{marginBottom:20}}>
        {[["ECP",hrs.ECP,"var(--blue)"],["UNISA",hrs.UNISA,"var(--acc)"],["ALX",hrs.ALX,"var(--ora)"],["AMAZON",hrs.AMAZON,"var(--gold)"],["TOTAL",tot,"#ffffff"]].map(([l,v,c])=>(
          <div key={l} className="chip"><div className="chip-n" style={{color:c}}>{v}</div><div className="chip-l">{l}</div></div>
        ))}
      </div>

      {/* ── TODAY TAB ── */}
      {tab==="today"&&(
        <div className="fu">
          {/* Day segmented control */}
          <div className="seg-ctrl" style={{marginBottom:14}}>
            {DAYS.map((d,i)=>(
              <button key={d} className={`seg-btn${di===i?" on":""}`} onClick={()=>setDi(i)}>{d}</button>
            ))}
          </div>

          {/* Hero progress */}
          <div className="hero" style={{background:pct===100?"linear-gradient(145deg,#0a3d1e,#030d08)":"linear-gradient(145deg,#1a1a1e,#0d0d10)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:16}}>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"var(--txt2)",marginBottom:6}}>
                  {tblocks.length>=10?"Heavy Day 🔥":tblocks.length>=6?"Solid Day ⚡":"Light Day ✅"}
                </div>
                <div style={{fontSize:52,fontWeight:700,letterSpacing:"-0.04em",lineHeight:1,color:pctCol(pct)}}>
                  {pct}<span style={{fontSize:24,opacity:0.6}}>%</span>
                </div>
                <div style={{fontSize:13,color:"var(--txt2)",marginTop:6}}>{done} of {tblocks.length} complete</div>
              </div>
              {pct===100&&<div style={{fontSize:40}}>🏆</div>}
            </div>
            <div className="pbar">
              <div className="pbar-fill" style={{width:`${pct}%`,background:pct===100?"linear-gradient(90deg,var(--acc),#5ee87a)":pct>=60?"linear-gradient(90deg,var(--gold),var(--ora))":"linear-gradient(90deg,var(--red),var(--ora))"}}/>
            </div>
            {pct===100&&<div style={{marginTop:10,fontSize:14,fontWeight:600,color:"var(--acc)"}}>Sharp ntwana — day done! 💪</div>}
          </div>

          {/* Timeline */}
          <div className="list-card" style={{marginTop:8}}>
            {tblocks.length===0
              ?<div style={{padding:"40px 16px",textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:12}}>🎉</div>
                <div style={{fontSize:17,fontWeight:600}}>Free day!</div>
                <div style={{fontSize:15,color:"var(--txt2)",marginTop:6}}>Rest up and recharge.</div>
              </div>
              :tblocks.map((b,bi)=>{
                const m=BM[b.type];const dn=checked[b.k];const isNew=justTicked===b.k;
                return(
                  <div key={b.k} onClick={()=>tog(b.k)} className={`tl-row${dn?" tl-done":""}`}>
                    <div className="tl-time">{b.time}</div>
                    <div className="tl-dot" style={{backgroundColor:dn?"transparent":m?.c,borderColor:dn?"var(--txt3)":m?.c}}/>
                    <div className="tl-body">
                      <div className="tl-name" style={{color:dn?"var(--txt3)":m?.c}}>{EM[b.type]} {b.label}</div>
                      <div className="tl-sub">{m?.n}</div>
                    </div>
                    <div className={`tl-check${isNew&&dn?" tick-anim":""}`}>{dn?"✅":"○"}</div>
                  </div>
                );
              })
            }
          </div>
        </div>
      )}

      {/* ── SCHEDULE TAB ── */}
      {tab==="schedule"&&(
        <div className="fu">
          <div className="filter-strip">
            {FILTERS.map(f=><button key={f.k} className={`fbtn${filter===f.k?" on":""}`} onClick={()=>setFilter(f.k)}>{f.l}</button>)}
          </div>
          <div className="tbl-scroll">
            <table className="stbl">
              <thead>
                <tr style={{background:"var(--sur)"}}>
                  <th style={{fontSize:10,color:"var(--txt3)",letterSpacing:"0.08em"}}>TIME</th>
                  {DAYS.map((d,i)=>{
                    const isToday=i===di;
                    const isWknd=["Sat","Sun"].includes(d);
                    return(
                      <th key={d} style={{
                        color:isToday?"#fff":isWknd?"var(--gold)":"var(--txt2)",
                        background:isToday?"var(--acc)":undefined,
                        fontSize:isToday?13:11,
                        borderBottom:isToday?"none":undefined,
                        borderRadius:isToday?"8px 8px 0 0":undefined,
                      }}>
                        {d}{isToday&&<div style={{fontSize:7,opacity:0.8,marginTop:1}}>TODAY</div>}
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {rows.map((row,ri)=>{
                  if(row.type==="sec"){
                    const c=coll[row.sec];
                    return(
                      <tr key={`s${ri}`}>
                        <td colSpan={8} className="sec-hdr"
                          onClick={()=>setColl(p=>({...p,[row.sec]:!p[row.sec]}))}>
                          {c?"▶":"▼"} {SEC_L[row.sec]||row.sec}
                        </td>
                      </tr>
                    );
                  }
                  const{slot}=row;
                  if(coll[slot.sec])return null;
                  const isSleep=slot.sec==="SLEEP";
                  return(
                    <tr key={slot.time} style={{opacity:isSleep?0.08:1}}>
                      <td>
                        <span style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:600,color:"var(--txt3)"}}>{slot.time}</span>
                      </td>
                      {DAYS.map((d,dii)=>{
                        const cell=slot[d];if(!cell)return<td key={d}/>;
                        const{type,label}=cell;const m=BM[type];const vis=isVis(type);
                        const isL=LIFE.has(type);const k=ck(slot.time,d);const dn=checked[k];const isTd=dii===di;
                        if(!vis||isSleep)return(
                          <td key={d} style={{background:isTd?"rgba(48,209,88,.06)":undefined}}/>
                        );
                        return(
                          <td key={d} style={{
                            background:isTd?"rgba(48,209,88,.08)":undefined,
                            boxShadow:isTd?"inset 3px 0 0 var(--acc)":undefined,
                          }}>
                            {!isL?(
                              <div className="scel" onClick={()=>tog(k)} style={{
                                borderLeftColor:m?.c,
                                background:dn?"var(--sur3)":m?.c+"30",
                                opacity:dn?0.3:1,
                              }}>
                                <div className="scel-lbl" style={{
                                  color:dn?"var(--txt3)":m?.c,
                                  textDecoration:dn?"line-through":"none",
                                  fontWeight:700,
                                }}>
                                  {EM[type]} {label}
                                </div>
                              </div>
                            ):(
                              <div style={{textAlign:"center",fontSize:13,color:"var(--txt3)",padding:4}}>{EM[type]}</div>
                            )}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── AMAZON TAB ── */}
      {tab==="amazon"&&<AmazonTab/>}

      {/* ── DEADLINES TAB ── */}
      {tab==="deadlines"&&<DeadlinesTab/>}
      {tab==="pipeline"&&<PipelineTab/>}
      {tab==="review"&&<ReviewTab checked={checked} slots={slots} wk={wk}/>}
      {tab==="notifs"&&<NotifsTab deadlines={Object.values(LS("deadlines_v1"))}/>}

      {/* ── EXAMS TAB ── */}
      {tab==="exams"&&(
        <div className="fu">
          {[{l:"AWS re/Start",d:EXAM.aws,mods:[],ic:"☁️",sub:"Full-time programme starts"},{l:"UNISA Sem 1 Exams",d:EXAM.s1,mods:["MAT1503","MAT1512","COS1511","INF1511"],ic:"📝",sub:"4 modules"},{l:"UNISA Sem 2 Exams",d:EXAM.s2,mods:["MAT1513","COS1512"],ic:"📝",sub:"2 modules"}].map(({l,d,mods,ic,sub})=>{
            const days=daysTo(d);const u=uc(days);
            return(
              <div key={l} className="card card-p" style={{borderLeft:`4px solid ${u}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--txt2)",marginBottom:4}}>{ic} {l}</div>
                    <div style={{fontSize:17,fontWeight:600,marginBottom:4}}>{d.toLocaleDateString("en-ZA",{day:"numeric",month:"long",year:"numeric"})}</div>
                    <div style={{fontSize:13,color:"var(--txt2)",marginBottom:mods.length?10:0}}>{sub}</div>
                    {mods.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{mods.map(m=>{const mod=UMODS.find(x=>x.id===m);return<span key={m} className="pill" style={{background:mod?.c+"22",color:mod?.c,border:`1px solid ${mod?.c}44`}}>{m}</span>;})}</div>}
                  </div>
                  <div style={{textAlign:"center",flexShrink:0}}>
                    <div className="cd-num" style={{color:u}}>{days}</div>
                    <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)"}}>days</div>
                  </div>
                </div>
                <div className="pbar" style={{marginTop:14}}>
                  <div className="pbar-fill" style={{width:`${Math.max(3,100-Math.min(days,90)/90*100)}%`,background:u}}/>
                </div>
                <div style={{fontSize:12,color:"var(--txt2)",marginTop:6}}>{days<=0?"🔴 Exam period!":days<=7?"🔴 This week!":days<=14?"🟠 2 weeks out":days<=30?"🟡 1 month out":"🟢 Planning phase"}</div>
              </div>
            );
          })}

          <div style={{fontSize:13,fontWeight:600,color:"var(--txt2)",textTransform:"uppercase",letterSpacing:"0.04em",margin:"20px 4px 10px"}}>Weekly Module Hours</div>
          <div className="list-card">
            {UMODS.map(m=>{
              const h=mhrs[m.id]||0;const ok=h>=3;const warn=h===0;
              return(
                <div key={m.id} className="mcard">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:15,fontWeight:600,color:m.c}}>{m.id}</div>
                      <div style={{fontSize:13,color:"var(--txt2)"}}>{m.n} · Sem {m.sem}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"var(--mono)",fontSize:22,fontWeight:700,color:warn?"var(--red)":ok?"var(--acc)":"var(--gold)"}}>{h}<span style={{fontSize:13,opacity:0.6}}>h</span></div>
                      <div style={{fontSize:11,color:"var(--txt3)"}}>≥3h target</div>
                    </div>
                  </div>
                  <div className="pbar">
                    <div className="pbar-fill" style={{width:`${Math.min(h/5*100,100)}%`,background:m.c}}/>
                  </div>
                  {warn&&<div style={{fontSize:12,color:"var(--red)",fontWeight:600}}>⚠️ Not scheduled this week</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── BOTTOM NAV ── */}
      {ReactDOM.createPortal(
        TABS.map(t=>(
          <button key={t.k} className={`nb${tab===t.k?" on":""}`} onClick={()=>setTab(t.k)}>
            <span className="ni">{t.i}</span>
            <span className="nb-label">{t.l}</span>
          </button>
        )),
        document.getElementById("nav-bar")
      )}
    </div>
  );
}

  const [lp,setLp]=useState(()=>LS("az_lp"));
  const [star,setStar]=useState(()=>LS("az_star"));
  const [ed,setEd]=useState(null);
  const [si,setSi]=useState("");
  const tLc=i=>{const n={...lc,[i]:!lc[i]};setLc(n);LSS("az_lc",n);if(navigator.vibrate)navigator.vibrate(40);};
  const tLp=i=>{const n={...lp,[i]:!lp[i]};setLp(n);LSS("az_lp",n);};
  const sav=i=>{const n={...star,[i]:si};setStar(n);LSS("az_star",n);setEd(null);};
  const lcd=Object.values(lc).filter(Boolean).length;
  const lpd=Object.values(lp).filter(Boolean).length;
  const sd=Object.values(star).filter(v=>v?.trim()).length;
  return(
    <div className="fu">
      <div className="card card-p" style={{background:"linear-gradient(145deg,#1a0e00,#0d0d10)",marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:"var(--gold)",marginBottom:4}}>Amazon SDE · Cape Town</div>
        <div style={{fontSize:22,fontWeight:700,marginBottom:14}}>Interview Prep Tracker</div>
        <div style={{display:"flex",gap:8}}>
          {[[`${lcd}/${LC.length}`,"LeetCode","#34d399"],[`${lpd}/${ALP.length}`,"LPs Done","#60a5fa"],[`${sd}/${ALP.length}`,"STAR","#f472b6"]].map(([v,l,c])=>(
            <div key={l} className="chip" style={{flex:1,background:"rgba(255,255,255,0.06)"}}><div className="chip-n" style={{color:c,fontSize:18}}>{v}</div><div className="chip-l">{l}</div></div>
          ))}
        </div>
      </div>

      <div style={{fontSize:13,fontWeight:600,color:"var(--txt2)",textTransform:"uppercase",letterSpacing:"0.04em",margin:"0 4px 8px"}}>LeetCode Patterns</div>
      <div className="pbar" style={{marginBottom:12}}>
        <div className="pbar-fill" style={{width:`${lcd/LC.length*100}%`,background:"linear-gradient(90deg,#34d399,#059669)"}}/>
      </div>
      <div className="list-card" style={{marginBottom:20}}>
        {LC.map((p,i)=>(
          <div key={i} className={`ci${lc[i]?" done":""}`} onClick={()=>tLc(i)}>
            <div className={`ci-check${lc[i]?" on":""}`} style={{background:lc[i]?"#059669":undefined,borderColor:lc[i]?"#059669":undefined}}>{lc[i]?"✓":""}</div>
            <span className="ci-num">{String(i+1).padStart(2,"0")}</span>
            <span className="ci-lbl">{p}</span>
          </div>
        ))}
      </div>

      <div style={{fontSize:13,fontWeight:600,color:"var(--txt2)",textTransform:"uppercase",letterSpacing:"0.04em",margin:"0 4px 8px"}}>Leadership Principles + STAR</div>
      <div className="pbar" style={{marginBottom:12}}>
        <div className="pbar-fill" style={{width:`${lpd/ALP.length*100}%`,background:"linear-gradient(90deg,#60a5fa,#3b82f6)"}}/>
      </div>
      <div className="list-card">
        {ALP.map((l,i)=>(
          <div key={i}>
            <div className={`ci${lp[i]?" done":""}`} style={{borderRadius:star[i]||ed===i?undefined:undefined}} onClick={()=>tLp(i)}>
              <div className={`ci-check${lp[i]?" on":""}`} style={{background:lp[i]?"var(--blue)":undefined,borderColor:lp[i]?"var(--blue)":undefined}}>{lp[i]?"✓":""}</div>
              <span className="ci-num">{String(i+1).padStart(2,"0")}</span>
              <span className="ci-lbl">{l}</span>
              <button onClick={e=>{e.stopPropagation();setEd(ed===i?null:i);setSi(star[i]||"");}} className="btn btn-xs btn-ghost" style={{color:star[i]?"var(--purple)":"var(--txt3)",flexShrink:0,fontSize:12}}>{star[i]?"📝":"+ STAR"}</button>
            </div>
            {(star[i]&&ed!==i)&&<div className="star-body">{star[i].slice(0,150)}{star[i].length>150?"…":""}</div>}
            {ed===i&&(
              <div className="star-body" style={{padding:"12px 16px"}}>
                <textarea value={si} onChange={e=>setSi(e.target.value)} placeholder={"S: Situation — what was the context?\nT: Task — what were you responsible for?\nA: Action — what did YOU do?\nR: Result — measurable outcome?"}/>
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <button className="btn btn-primary btn-sm" onClick={()=>sav(i)}>Save</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setEd(null)}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── DEADLINES TAB ────────────────────────────────────────────────────────────
const DEADLINE_TYPES=[
  {k:"PHY",    l:"PHY Test",      c:"#2060c0", ic:"⚛"},
  {k:"ISC153", l:"ISC153 Test",   c:"#207840", ic:"🔬"},
  {k:"MAM151", l:"MAM151 Test",   c:"#a04010", ic:"📐"},
  {k:"UNISA",  l:"UNISA Assign.", c:"#0288d1", ic:"📚"},
  {k:"ALX",    l:"ALX Submit",    c:"#b04000", ic:"🌍"},
  {k:"AWS",    l:"AWS re/Start",  c:"#c05000", ic:"☁"},
  {k:"AMAZON", l:"Amazon Prep",   c:"#92400e", ic:"📦"},
  {k:"MWR",    l:"MWR Internship",c:"#5a1880", ic:"🛡"},
];

function DeadlinesTab(){
  const [deadlines,setDeadlines]=useState(()=>LS("deadlines_v1"));
  const [showing,setShowing]=useState("form"); // "form"|"calendar"
  const [form,setForm]=useState({title:"",type:"PHY",date:"",note:""});
  const [calMonth,setCalMonth]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const [selected,setSelected]=useState(null); // selected date string YYYY-MM-DD

  const save=()=>{
    if(!form.title.trim()||!form.date)return;
    const id=Date.now().toString();
    const n={...deadlines,[id]:{...form,id,done:false,created:new Date().toISOString()}};
    setDeadlines(n);LSS("deadlines_v1",n);
    setForm({title:"",type:"PHY",date:"",note:""});
  };

  const toggleDone=id=>{
    const n={...deadlines,[id]:{...deadlines[id],done:!deadlines[id].done}};
    setDeadlines(n);LSS("deadlines_v1",n);
    if(navigator.vibrate)navigator.vibrate(30);
  };

  const del=id=>{
    const n={...deadlines};delete n[id];
    setDeadlines(n);LSS("deadlines_v1",n);
  };

  const items=Object.values(deadlines).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const upcoming=items.filter(d=>!d.done&&new Date(d.date)>=new Date().setHours(0,0,0,0));
  const overdue=items.filter(d=>!d.done&&new Date(d.date)<new Date().setHours(0,0,0,0));
  const done=items.filter(d=>d.done);

  const daysUntilD=dateStr=>{
    const diff=Math.ceil((new Date(dateStr)-new Date().setHours(0,0,0,0))/86400000);
    return diff;
  };
  const urgColor=d=>d<0?"var(--red)":d===0?"var(--red)":d<=3?"var(--ora)":d<=7?"var(--gold)":"var(--acc)";
  const urgLabel=d=>d<0?`${Math.abs(d)}d overdue`:d===0?"Today!":d===1?"Tomorrow":`${d} days`;

  // Calendar helpers
  const getDaysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
  const getFirstDay=(y,m)=>new Date(y,m,1).getDay(); // 0=Sun
  const toDateStr=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const deadlinesByDate=useMemo(()=>{
    const map={};
    items.forEach(dl=>{if(!map[dl.date])map[dl.date]=[];map[dl.date].push(dl);});
    return map;
  },[deadlines]);

  const todayStr=new Date().toISOString().slice(0,10);
  const daysInMonth=getDaysInMonth(calMonth.y,calMonth.m);
  const firstDay=getFirstDay(calMonth.y,calMonth.m);
  const firstDayAdj=firstDay===0?6:firstDay-1; // Mon-start
  const monthName=new Date(calMonth.y,calMonth.m,1).toLocaleDateString("en-ZA",{month:"long",year:"numeric"});
  const selectedItems=selected?deadlinesByDate[selected]||[]:[];

  const DeadlineRow=({dl,showDel=true})=>{
    const dt=DEADLINE_TYPES.find(t=>t.k===dl.type)||DEADLINE_TYPES[0];
    const days=daysUntilD(dl.date);
    const uc=urgColor(days);
    return(
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"13px 16px",borderBottom:"0.5px solid var(--sep)",transition:"background .12s",cursor:"pointer"}}
        onClick={()=>toggleDone(dl.id)}>
        {/* Checkbox */}
        <div style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${dl.done?"var(--acc)":uc}`,background:dl.done?"var(--acc)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .25s cubic-bezier(.34,1.56,.64,1)",fontSize:12,color:"#fff",fontWeight:700}}>
          {dl.done?"✓":""}
        </div>
        {/* Type badge */}
        <div style={{width:28,height:28,borderRadius:8,background:dt.c+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{dt.ic}</div>
        {/* Content */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:15,fontWeight:500,textDecoration:dl.done?"line-through":"none",color:dl.done?"var(--txt3)":"var(--txt)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{dl.title}</div>
          <div style={{fontSize:12,color:"var(--txt2)",marginTop:1}}>
            {dt.l} · {new Date(dl.date+"T00:00:00").toLocaleDateString("en-ZA",{day:"numeric",month:"short"})}
          </div>
        </div>
        {/* Urgency */}
        {!dl.done&&(
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:12,fontWeight:700,color:uc}}>{urgLabel(days)}</div>
          </div>
        )}
        {/* Delete */}
        {showDel&&(
          <button onClick={e=>{e.stopPropagation();del(dl.id);}} style={{background:"transparent",border:"none",color:"var(--txt3)",fontSize:16,cursor:"pointer",padding:"4px",flexShrink:0}}>✕</button>
        )}
      </div>
    );
  };

  return(
    <div className="fu">
      {/* Header stats */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[[upcoming.length,"Upcoming","var(--acc)"],[overdue.length,"Overdue","var(--red)"],[done.length,"Done","var(--txt3)"]].map(([v,l,c])=>(
          <div key={l} className="chip" style={{flex:1}}><div className="chip-n" style={{color:c,fontSize:20}}>{v}</div><div className="chip-l">{l}</div></div>
        ))}
      </div>

      {/* View toggle */}
      <div className="seg-ctrl" style={{marginBottom:14}}>
        {[["form","➕ Add"],["list","📋 List"],["calendar","📅 Calendar"]].map(([k,l])=>(
          <button key={k} className={`seg-btn${showing===k?" on":""}`} onClick={()=>{setShowing(k);setSelected(null);}}>{l}</button>
        ))}
      </div>

      {/* ── ADD FORM ── */}
      {showing==="form"&&(
        <div className="list-card">
          {/* Title */}
          <div style={{padding:"14px 16px",borderBottom:"0.5px solid var(--sep)"}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)",letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:8}}>Deadline Title</div>
            <input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}
              placeholder="e.g. PHY Test 1, UNISA Assignment 02..."
              style={{width:"100%",background:"transparent",border:"none",fontSize:16,color:"var(--txt)",outline:"none",padding:0}}/>
          </div>
          {/* Type */}
          <div style={{padding:"14px 16px",borderBottom:"0.5px solid var(--sep)"}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)",letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:10}}>Category</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {DEADLINE_TYPES.map(t=>(
                <button key={t.k} onClick={()=>setForm(p=>({...p,type:t.k}))} style={{
                  fontFamily:"inherit",fontSize:12,fontWeight:600,padding:"6px 12px",borderRadius:99,
                  border:`1.5px solid ${form.type===t.k?t.c:t.c+"44"}`,
                  background:form.type===t.k?t.c+"22":"transparent",
                  color:form.type===t.k?t.c:"var(--txt2)",cursor:"pointer",transition:"all .15s",
                }}>{t.ic} {t.l}</button>
              ))}
            </div>
          </div>
          {/* Date */}
          <div style={{padding:"14px 16px",borderBottom:"0.5px solid var(--sep)"}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)",letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:8}}>Due Date</div>
            <input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}
              style={{background:"transparent",border:"none",fontSize:16,color:"var(--txt)",outline:"none",width:"100%",colorScheme:localStorage.getItem("th")==="light"?"light":"dark"}}/>
          </div>
          {/* Note */}
          <div style={{padding:"14px 16px",borderBottom:"0.5px solid var(--sep)"}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)",letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:8}}>Note (optional)</div>
            <input value={form.note} onChange={e=>setForm(p=>({...p,note:e.target.value}))}
              placeholder="e.g. Chapters 1-4, bring calculator..."
              style={{width:"100%",background:"transparent",border:"none",fontSize:15,color:"var(--txt)",outline:"none",padding:0}}/>
          </div>
          {/* Save */}
          <div style={{padding:"14px 16px"}}>
            <button className="btn btn-primary" style={{width:"100%",fontSize:16,padding:"14px"}}
              onClick={save} disabled={!form.title.trim()||!form.date}>
              Add Deadline
            </button>
          </div>
        </div>
      )}

      {/* ── LIST VIEW ── */}
      {showing==="list"&&(
        <div>
          {overdue.length>0&&(
            <>
              <div style={{fontSize:11,fontWeight:600,color:"var(--red)",textTransform:"uppercase",letterSpacing:"0.04em",margin:"0 4px 8px"}}>⚠️ Overdue</div>
              <div className="list-card" style={{marginBottom:14}}>
                {overdue.map(dl=><DeadlineRow key={dl.id} dl={dl}/>)}
              </div>
            </>
          )}
          {upcoming.length>0&&(
            <>
              <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)",textTransform:"uppercase",letterSpacing:"0.04em",margin:"0 4px 8px"}}>Upcoming</div>
              <div className="list-card" style={{marginBottom:14}}>
                {upcoming.map(dl=><DeadlineRow key={dl.id} dl={dl}/>)}
              </div>
            </>
          )}
          {done.length>0&&(
            <>
              <div style={{fontSize:11,fontWeight:600,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.04em",margin:"0 4px 8px"}}>Completed</div>
              <div className="list-card" style={{marginBottom:14,opacity:0.6}}>
                {done.map(dl=><DeadlineRow key={dl.id} dl={dl}/>)}
              </div>
            </>
          )}
          {items.length===0&&(
            <div style={{padding:"48px 16px",textAlign:"center"}}>
              <div style={{fontSize:48,marginBottom:12}}>📋</div>
              <div style={{fontSize:17,fontWeight:600,marginBottom:6}}>No deadlines yet</div>
              <div style={{fontSize:14,color:"var(--txt2)"}}>Tap ➕ Add to create your first one.</div>
            </div>
          )}
        </div>
      )}

      {/* ── CALENDAR VIEW ── */}
      {showing==="calendar"&&(
        <div>
          {/* Month nav - bold */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <button onClick={()=>setCalMonth(p=>{const d=new Date(p.y,p.m-1,1);return{y:d.getFullYear(),m:d.getMonth()};})
            } style={{width:44,height:44,borderRadius:"50%",border:"none",background:"var(--sur2)",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--txt)"}}>‹</button>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:800,letterSpacing:"-0.02em"}}>{new Date(calMonth.y,calMonth.m,1).toLocaleDateString("en-ZA",{month:"long"})}</div>
              <div style={{fontSize:13,color:"var(--txt2)",fontWeight:600,marginTop:1}}>{calMonth.y}</div>
            </div>
            <button onClick={()=>setCalMonth(p=>{const d=new Date(p.y,p.m+1,1);return{y:d.getFullYear(),m:d.getMonth()};})
            } style={{width:44,height:44,borderRadius:"50%",border:"none",background:"var(--sur2)",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--txt)"}}>›</button>
          </div>

          {/* Calendar grid */}
          <div className="card" style={{padding:"16px 12px",marginBottom:14}}>
            {/* Day headers */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:8}}>
              {["Mo","Tu","We","Th","Fr","Sa","Su"].map((d,i)=>(
                <div key={d} style={{textAlign:"center",fontSize:12,fontWeight:800,color:i>=5?"var(--gold)":"var(--txt3)",padding:"4px 0",letterSpacing:"0.04em"}}>{d}</div>
              ))}
            </div>
            {/* Day cells */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
              {Array(firstDayAdj).fill(null).map((_,i)=><div key={`e${i}`}/>)}
              {Array(daysInMonth).fill(null).map((_,i)=>{
                const day=i+1;
                const dateStr=toDateStr(calMonth.y,calMonth.m,day);
                const hasItems=deadlinesByDate[dateStr]?.length>0;
                const isToday=dateStr===todayStr;
                const isSel=dateStr===selected;
                const overDue=hasItems&&deadlinesByDate[dateStr].some(d=>!d.done&&new Date(d.date)<new Date().setHours(0,0,0,0));
                const pendingItems=hasItems?deadlinesByDate[dateStr].filter(d=>!d.done):[];
                const dotColor=overDue?"var(--red)":pendingItems.length?urgColor(daysUntilD(dateStr)):"var(--txt3)";
                const isWknd=i%7>=5;
                return(
                  <div key={day} onClick={()=>setSelected(isSel?null:dateStr)} style={{
                    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                    minHeight:52,borderRadius:12,cursor:"pointer",
                    background:isSel?"var(--acc)":isToday?"transparent":"transparent",
                    border:isToday&&!isSel?"2.5px solid var(--acc)":isSel?"none":"2px solid transparent",
                    transition:"all .15s cubic-bezier(.4,0,.2,1)",
                    position:"relative",
                  }}>
                    <div style={{
                      fontSize:16,fontWeight:isToday||isSel?800:isWknd?600:400,
                      color:isSel?"#fff":isToday?"var(--acc)":isWknd?"var(--gold)":"var(--txt)",
                      lineHeight:1,
                    }}>{day}</div>
                    {/* Deadline dots */}
                    {hasItems&&(
                      <div style={{display:"flex",gap:2,marginTop:4,justifyContent:"center"}}>
                        {deadlinesByDate[dateStr].slice(0,3).map((dl,di2)=>{
                          const dlDot=dl.done?"var(--txt3)":overDue?"var(--red)":urgColor(daysUntilD(dateStr));
                          return<div key={di2} style={{width:6,height:6,borderRadius:"50%",background:isSel?"rgba(255,255,255,0.9)":dlDot}}/>;
                        })}
                      </div>
                    )}
                    {/* Count badge for 3+ */}
                    {hasItems&&deadlinesByDate[dateStr].length>3&&(
                      <div style={{position:"absolute",top:3,right:3,width:14,height:14,borderRadius:"50%",background:isSel?"rgba(255,255,255,0.3)":"var(--red)",fontSize:8,fontWeight:800,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {deadlinesByDate[dateStr].length}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Selected day items */}
          {selected&&(
            <div className="fu">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",margin:"0 4px 10px"}}>
                <div style={{fontSize:16,fontWeight:700}}>
                  {new Date(selected+"T00:00:00").toLocaleDateString("en-ZA",{weekday:"long",day:"numeric",month:"long"})}
                </div>
                <div style={{fontSize:12,color:"var(--txt3)"}}>{selectedItems.length} item{selectedItems.length!==1?"s":""}</div>
              </div>
              {selectedItems.length===0
                ?<div className="card card-p" style={{textAlign:"center",color:"var(--txt2)",fontSize:14,padding:"28px 16px"}}>
                  <div style={{fontSize:32,marginBottom:8}}>📋</div>
                  No deadlines — tap ➕ Add to create one.
                </div>
                :<div className="list-card">{selectedItems.map(dl=><DeadlineRow key={dl.id} dl={dl}/>)}</div>
              }
            </div>
          )}

          {/* Legend */}
          <div style={{display:"flex",gap:10,flexWrap:"wrap",padding:"10px 4px",marginTop:4}}>
            {[["var(--red)","Overdue"],["var(--ora)","≤3 days"],["var(--gold)","≤7 days"],["var(--acc)","Coming up"],["var(--txt3)","Done"]].map(([c,l])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                <div style={{width:9,height:9,borderRadius:"50%",background:c}}/>
                <span style={{fontSize:11,fontWeight:500,color:"var(--txt2)"}}>{l}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

  {id:"phy",    l:"ECP PHY",      c:"#2060c0", max:100},
  {id:"isc153", l:"ECP ISC153",   c:"#207840", max:100},
  {id:"mam151", l:"ECP MAM151",   c:"#a04010", max:100},
  {id:"mat1503",l:"MAT1503",      c:"#0277bd", max:100},
  {id:"mat1512",l:"MAT1512",      c:"#0288d1", max:100},
  {id:"mat1513",l:"MAT1513",      c:"#039be5", max:100},
  {id:"cos1511",l:"COS1511",      c:"#37474f", max:100},
  {id:"cos1512",l:"COS1512",      c:"#455a64", max:100},
  {id:"inf1511",l:"INF1511",      c:"#4e342e", max:100},
  {id:"aws_int",l:"AWS Interview Prep",c:"#c05000",max:100},
];

const PAST_PAPER_MODS=[
  {id:"MAT1503",n:"Linear Algebra I", c:"#0277bd"},
  {id:"MAT1512",n:"Calculus A",       c:"#0288d1"},
  {id:"MAT1513",n:"Calculus B",       c:"#039be5"},
  {id:"COS1511",n:"Programming I",    c:"#37474f"},
  {id:"COS1512",n:"Programming II",   c:"#455a64"},
  {id:"INF1511",n:"Visual Prog I",    c:"#4e342e"},
];

function PipelineTab(){
  const [section,setSection]=useState("kanban");
  const [opps,setOpps]=useState(()=>{
    const saved=LS("pipeline_opps");
    if(Object.keys(saved).length>0) return saved;
    const def={};DEFAULT_OPPS.forEach(o=>{def[o.id]=o;});return def;
  });
  const [grades,setGrades]=useState(()=>LS("pipeline_grades"));
  const [papers,setPapers]=useState(()=>LS("pipeline_papers"));
  const [addForm,setAddForm]=useState({title:"",org:"",type:"Internship",col:"applied",note:""});
  const [showAdd,setShowAdd]=useState(false);
  const [editGrade,setEditGrade]=useState(null);
  const [gradeInput,setGradeInput]=useState("");
  const [paperForm,setPaperForm]=useState({mod:"MAT1503",year:"",score:"",note:""});
  const [showPaperForm,setShowPaperForm]=useState(false);

  // ── KANBAN ──
  const saveOpps=o=>{setOpps(o);LSS("pipeline_opps",o);};
  const moveOpp=(id,col)=>saveOpps({...opps,[id]:{...opps[id],col}});
  const delOpp=id=>{const n={...opps};delete n[id];saveOpps(n);};
  const addOpp=()=>{
    if(!addForm.title.trim())return;
    const id=Date.now().toString();
    saveOpps({...opps,[id]:{...addForm,id,date:new Date().toISOString().slice(0,7)}});
    setAddForm({title:"",org:"",type:"Internship",col:"applied",note:""});
    setShowAdd(false);
  };

  // ── GRADES ──
  const saveGrade=(subId,score)=>{
    const existing=grades[subId]||{scores:[]};
    const n={...grades,[subId]:{...existing,scores:[...existing.scores,{score:parseFloat(score),date:new Date().toISOString().slice(0,10)}]}};
    setGrades(n);LSS("pipeline_grades",n);
  };
  const avgScore=subId=>{
    const scores=grades[subId]?.scores||[];
    if(!scores.length)return null;
    return Math.round(scores.reduce((a,b)=>a+b.score,0)/scores.length*10)/10;
  };
  const gradeColor=s=>s===null?"var(--txt3)":s>=75?"var(--acc)":s>=60?"var(--gold)":s>=50?"var(--ora)":"var(--red)";
  const gradeLabel=s=>s===null?"No grades yet":s>=75?"Distinction 🏆":s>=60?"Pass ✅":s>=50?"Minimum pass ⚠️":"Failing ❌";

  // ── PAST PAPERS ──
  const papersByMod=useMemo(()=>{
    const m={};PAST_PAPER_MODS.forEach(mod=>{m[mod.id]=[];});
    Object.values(papers).forEach(p=>{if(m[p.mod])m[p.mod].push(p);});
    Object.keys(m).forEach(k=>m[k].sort((a,b)=>b.year-a.year));
    return m;
  },[papers]);
  const addPaper=()=>{
    if(!paperForm.year||!paperForm.score)return;
    const id=Date.now().toString();
    const n={...papers,[id]:{...paperForm,id,score:parseFloat(paperForm.score)}};
    setPapers(n);LSS("pipeline_papers",n);
    setPaperForm({mod:"MAT1503",year:"",score:"",note:""});
    setShowPaperForm(false);
  };
  const delPaper=id=>{const n={...papers};delete n[id];setPapers(n);LSS("pipeline_papers",n);};

  const oppList=Object.values(opps);
  const totalPapers=Object.values(papers).length;
  const avgPaperScore=totalPapers?Math.round(Object.values(papers).reduce((a,b)=>a+b.score,0)/totalPapers):null;

  return(
    <div className="fu">
      {/* Summary chips */}
      <div className="chips" style={{marginBottom:14}}>
        {[[oppList.filter(o=>o.col==="interview").length,"Interviews","var(--purple)"],
          [oppList.filter(o=>o.col==="offer").length,"Offers","var(--acc)"],
          [totalPapers,"Papers","var(--blue)"],
          [avgPaperScore?`${avgPaperScore}%`:"—","Avg Paper","var(--gold)"]
        ].map(([v,l,c])=>(
          <div key={l} className="chip" style={{flex:1}}><div className="chip-n" style={{color:c,fontSize:18}}>{v}</div><div className="chip-l">{l}</div></div>
        ))}
      </div>

      {/* Section toggle */}
      <div className="seg-ctrl" style={{marginBottom:16}}>
        {[["kanban","🚀 Pipeline"],["grades","📊 Grades"],["papers","📄 Past Papers"]].map(([k,l])=>(
          <button key={k} className={`seg-btn${section===k?" on":""}`} onClick={()=>setSection(k)}>{l}</button>
        ))}
      </div>

      {/* ── KANBAN ── */}
      {section==="kanban"&&(
        <div>
          {/* Add button */}
          <button className="btn btn-primary" style={{width:"100%",marginBottom:14,fontSize:15}} onClick={()=>setShowAdd(s=>!s)}>
            {showAdd?"Cancel":"➕ Add Opportunity"}
          </button>

          {/* Add form */}
          {showAdd&&(
            <div className="list-card" style={{marginBottom:14}}>
              {[["Title","title","text","e.g. Investec Internship 2026"],["Organisation","org","text","e.g. Investec"]].map(([lbl,key,type,ph])=>(
                <div key={key} style={{padding:"12px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                  <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)",letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:6}}>{lbl}</div>
                  <input value={addForm[key]} onChange={e=>setAddForm(p=>({...p,[key]:e.target.value}))} placeholder={ph}
                    style={{width:"100%",background:"transparent",border:"none",fontSize:15,color:"var(--txt)",outline:"none"}}/>
                </div>
              ))}
              <div style={{padding:"12px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)",letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:8}}>Type</div>
                <div style={{display:"flex",gap:6}}>
                  {["Internship","Learnership","Job","Other"].map(t=>(
                    <button key={t} onClick={()=>setAddForm(p=>({...p,type:t}))} style={{fontFamily:"inherit",fontSize:12,fontWeight:600,padding:"5px 12px",borderRadius:99,border:`1.5px solid ${addForm.type===t?"var(--acc)":"var(--bdr2)"}`,background:addForm.type===t?"var(--acc-dim)":"transparent",color:addForm.type===t?"var(--acc)":"var(--txt2)",cursor:"pointer"}}>{t}</button>
                  ))}
                </div>
              </div>
              <div style={{padding:"12px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)",letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:8}}>Status</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {KANBAN_COLS.map(c=>(
                    <button key={c.k} onClick={()=>setAddForm(p=>({...p,col:c.k}))} style={{fontFamily:"inherit",fontSize:11,fontWeight:600,padding:"5px 10px",borderRadius:99,border:`1.5px solid ${addForm.col===c.k?c.c:"var(--bdr2)"}`,background:addForm.col===c.k?c.c+"22":"transparent",color:addForm.col===c.k?c.c:"var(--txt2)",cursor:"pointer"}}>{c.ic} {c.l}</button>
                  ))}
                </div>
              </div>
              <div style={{padding:"12px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)",letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:6}}>Note</div>
                <input value={addForm.note} onChange={e=>setAddForm(p=>({...p,note:e.target.value}))} placeholder="e.g. Deadline March 20, closing soon..."
                  style={{width:"100%",background:"transparent",border:"none",fontSize:15,color:"var(--txt)",outline:"none"}}/>
              </div>
              <div style={{padding:"12px 16px"}}>
                <button className="btn btn-primary" style={{width:"100%"}} onClick={addOpp}>Save Opportunity</button>
              </div>
            </div>
          )}

          {/* Kanban columns */}
          {KANBAN_COLS.map(col=>{
            const colOpps=oppList.filter(o=>o.col===col.k);
            if(col.k==="rejected"&&colOpps.length===0)return null;
            return(
              <div key={col.k} style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:col.c,flexShrink:0}}/>
                  <div style={{fontSize:13,fontWeight:700,color:col.c}}>{col.ic} {col.l}</div>
                  <div style={{fontSize:12,color:"var(--txt3)",fontFamily:"var(--mono)"}}>{colOpps.length}</div>
                </div>
                {colOpps.length===0
                  ?<div style={{padding:"14px 16px",background:"var(--sur2)",borderRadius:var_r_sm,fontSize:13,color:"var(--txt3)",textAlign:"center",border:"1.5px dashed var(--bdr2)"}}>None here</div>
                  :<div className="list-card">
                    {colOpps.map(opp=>(
                      <div key={opp.id} style={{padding:"13px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:15,fontWeight:600}}>{opp.title}</div>
                            <div style={{fontSize:12,color:"var(--txt2)",marginTop:2}}>{opp.org} · {opp.type}</div>
                            {opp.note&&<div style={{fontSize:12,color:"var(--txt2)",marginTop:4,fontStyle:"italic"}}>{opp.note}</div>}
                          </div>
                          <button onClick={()=>delOpp(opp.id)} style={{background:"transparent",border:"none",color:"var(--txt3)",fontSize:16,cursor:"pointer",padding:"0 0 0 8px",flexShrink:0}}>✕</button>
                        </div>
                        {/* Move buttons */}
                        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}>
                          {KANBAN_COLS.filter(c=>c.k!==col.k).map(c=>(
                            <button key={c.k} onClick={()=>moveOpp(opp.id,c.k)} style={{fontFamily:"inherit",fontSize:10,fontWeight:600,padding:"3px 9px",borderRadius:99,border:`1px solid ${c.c}44`,background:`${c.c}11`,color:c.c,cursor:"pointer"}}>→ {c.l}</button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                }
              </div>
            );
          })}
        </div>
      )}

      {/* ── GRADES ── */}
      {section==="grades"&&(
        <div>
          <div style={{fontSize:12,color:"var(--txt2)",marginBottom:14,padding:"0 4px"}}>Tap a subject to log a new grade. Average is calculated across all entries.</div>
          <div className="list-card">
            {GRADE_SUBJECTS.map(sub=>{
              const avg=avgScore(sub.id);
              const subGrades=grades[sub.id]?.scores||[];
              const isEditing=editGrade===sub.id;
              return(
                <div key={sub.id}>
                  <div onClick={()=>{setEditGrade(isEditing?null:sub.id);setGradeInput("");}} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",borderBottom:"0.5px solid var(--sep)",cursor:"pointer",transition:"background .12s"}} className="tl-row">
                    <div style={{width:10,height:10,borderRadius:3,background:sub.c,flexShrink:0}}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:600}}>{sub.l}</div>
                      <div style={{fontSize:12,color:"var(--txt2)",marginTop:1}}>{gradeLabel(avg)} · {subGrades.length} entr{subGrades.length===1?"y":"ies"}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"var(--mono)",fontSize:22,fontWeight:700,color:gradeColor(avg)}}>{avg!==null?`${avg}%`:"—"}</div>
                    </div>
                  </div>
                  {/* Grade bar */}
                  {avg!==null&&(
                    <div style={{padding:"0 16px 10px",borderBottom:"0.5px solid var(--sep)"}}>
                      <div className="pbar"><div className="pbar-fill" style={{width:`${avg}%`,background:gradeColor(avg)}}/></div>
                      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                          {subGrades.slice(-5).map((g,i)=>(
                            <span key={i} style={{fontSize:10,fontFamily:"var(--mono)",color:gradeColor(g.score),background:`${sub.c}15`,borderRadius:4,padding:"1px 5px"}}>{g.score}%</span>
                          ))}
                        </div>
                        <span style={{fontSize:10,color:"var(--txt3)"}}>last {Math.min(subGrades.length,5)}</span>
                      </div>
                    </div>
                  )}
                  {/* Log grade input */}
                  {isEditing&&(
                    <div style={{padding:"10px 16px",borderBottom:"0.5px solid var(--sep)",background:"var(--sur2)",display:"flex",gap:8,alignItems:"center"}}>
                      <input type="number" min="0" max="100" value={gradeInput} onChange={e=>setGradeInput(e.target.value)}
                        placeholder="Enter score (0–100)"
                        style={{flex:1,background:"transparent",border:"1px solid var(--bdr2)",borderRadius:8,padding:"8px 12px",fontSize:15,color:"var(--txt)",outline:"none"}}/>
                      <button className="btn btn-primary btn-sm" onClick={()=>{if(gradeInput)saveGrade(sub.id,gradeInput);setEditGrade(null);setGradeInput("");}}>Save</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setEditGrade(null)}>✕</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── PAST PAPERS ── */}
      {section==="papers"&&(
        <div>
          <button className="btn btn-primary" style={{width:"100%",marginBottom:14}} onClick={()=>setShowPaperForm(s=>!s)}>
            {showPaperForm?"Cancel":"➕ Log Past Paper"}
          </button>

          {showPaperForm&&(
            <div className="list-card" style={{marginBottom:14}}>
              {/* Module */}
              <div style={{padding:"12px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)",letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:8}}>Module</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {PAST_PAPER_MODS.map(m=>(
                    <button key={m.id} onClick={()=>setPaperForm(p=>({...p,mod:m.id}))} style={{fontFamily:"inherit",fontSize:11,fontWeight:600,padding:"5px 10px",borderRadius:99,border:`1.5px solid ${paperForm.mod===m.id?m.c:"var(--bdr2)"}`,background:paperForm.mod===m.id?m.c+"22":"transparent",color:paperForm.mod===m.id?m.c:"var(--txt2)",cursor:"pointer"}}>{m.id}</button>
                  ))}
                </div>
              </div>
              {/* Year + Score */}
              {[["Year","year","number","e.g. 2023"],["Score (%)","score","number","e.g. 78"]].map(([lbl,key,type,ph])=>(
                <div key={key} style={{padding:"12px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                  <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)",letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:6}}>{lbl}</div>
                  <input type={type} value={paperForm[key]} onChange={e=>setPaperForm(p=>({...p,[key]:e.target.value}))} placeholder={ph}
                    style={{width:"100%",background:"transparent",border:"none",fontSize:15,color:"var(--txt)",outline:"none"}}/>
                </div>
              ))}
              {/* Note */}
              <div style={{padding:"12px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                <div style={{fontSize:11,fontWeight:600,color:"var(--txt2)",letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:6}}>Note</div>
                <input value={paperForm.note} onChange={e=>setPaperForm(p=>({...p,note:e.target.value}))} placeholder="e.g. struggled with section B..."
                  style={{width:"100%",background:"transparent",border:"none",fontSize:15,color:"var(--txt)",outline:"none"}}/>
              </div>
              <div style={{padding:"12px 16px"}}>
                <button className="btn btn-primary" style={{width:"100%"}} onClick={addPaper}>Save Paper</button>
              </div>
            </div>
          )}

          {/* Papers by module */}
          {PAST_PAPER_MODS.map(mod=>{
            const modPapers=papersByMod[mod.id]||[];
            const modAvg=modPapers.length?Math.round(modPapers.reduce((a,b)=>a+b.score,0)/modPapers.length):null;
            return(
              <div key={mod.id} style={{marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{width:10,height:10,borderRadius:3,background:mod.c}}/>
                  <div style={{fontSize:13,fontWeight:700,color:mod.c}}>{mod.id}</div>
                  <div style={{fontSize:12,color:"var(--txt3)"}}>{mod.n}</div>
                  {modAvg!==null&&<div style={{marginLeft:"auto",fontFamily:"var(--mono)",fontSize:13,fontWeight:700,color:gradeColor(modAvg)}}>{modAvg}% avg</div>}
                </div>
                {modPapers.length===0
                  ?<div style={{padding:"12px 16px",background:"var(--sur2)",borderRadius:var_r_sm,fontSize:13,color:"var(--txt3)",textAlign:"center",border:"1.5px dashed var(--bdr2)"}}>No papers logged yet</div>
                  :<div className="list-card">
                    {modPapers.map(p=>(
                      <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",borderBottom:"0.5px solid var(--sep)"}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:600}}>{p.year} Past Paper</div>
                          {p.note&&<div style={{fontSize:12,color:"var(--txt2)",marginTop:2}}>{p.note}</div>}
                        </div>
                        <div style={{fontFamily:"var(--mono)",fontSize:18,fontWeight:700,color:gradeColor(p.score),flexShrink:0}}>{p.score}%</div>
                        <button onClick={()=>delPaper(p.id)} style={{background:"transparent",border:"none",color:"var(--txt3)",fontSize:14,cursor:"pointer",padding:"4px",flexShrink:0}}>✕</button>
                      </div>
                    ))}
                  </div>
                }
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── REVIEW TAB ───────────────────────────────────────────────────────────────
function ReviewTab({checked,slots,wk}){
  const [reviews,setReviews]=useState(()=>LS("reviews_v1"));
  const [view,setView]=useState("this"); // "this"|"history"
  const [form,setForm]=useState(()=>LS("reviews_v1")[wk]||{
    win:"",skipped:"",energy:0,different:"",rating:0,done:false
  });

  const saveReviews=(r)=>{setReviews(r);LSS("reviews_v1",r);};

  // Auto-calculate blocks completed from ticks
  const blocksTotal=useMemo(()=>{
    let t=0;
    slots.forEach(s=>{if(s.sec==="SLEEP")return;DAYS.forEach(d=>{const sl=s[d];if(sl&&!LIFE.has(sl.type))t++;});});
    return t;
  },[slots]);
  const blocksDone=useMemo(()=>Object.keys(checked).filter(k=>k.startsWith(wk)&&checked[k]).length,[checked,wk]);
  const blocksPercent=blocksTotal?Math.round(blocksDone/blocksTotal*100):0;

  const saveForm=()=>{
    if(!form.win.trim())return;
    const r={...reviews,[wk]:{...form,done:true,savedAt:new Date().toISOString(),blocksDone,blocksTotal,blocksPercent}};
    saveReviews(r);
    setForm(p=>({...p,done:true}));
  };

  const allReviews=Object.entries(reviews)
    .filter(([,v])=>v.done)
    .sort(([a],[b])=>b.localeCompare(a));

  const streak=useMemo(()=>{
    let s=0;let d=new Date();
    while(true){
      d.setDate(d.getDate()-((d.getDay()+6)%7));
      const k=d.toISOString().slice(0,10);
      if(!reviews[k]?.done)break;
      s++;d.setDate(d.getDate()-7);
    }
    return s;
  },[reviews]);

  const thisReview=reviews[wk];
  const isSaved=thisReview?.done;

  const StarRow=({val,max=5,onChange,color="var(--gold)"})=>(
    <div style={{display:"flex",gap:6}}>
      {Array(max).fill(null).map((_,i)=>(
        <button key={i} onClick={()=>onChange(i+1)} style={{
          fontSize:28,background:"transparent",border:"none",cursor:"pointer",
          opacity:i<val?1:0.2,transition:"all .15s cubic-bezier(.34,1.56,.64,1)",
          transform:i<val?"scale(1.1)":"scale(1)",
          filter:i<val?"none":"grayscale(1)",
        }}>⭐</button>
      ))}
    </div>
  );

  const EnergyRow=({val,onChange})=>{
    const opts=["😴","😐","🙂","😊","🔥"];
    return(
      <div style={{display:"flex",gap:8}}>
        {opts.map((e,i)=>(
          <button key={i} onClick={()=>onChange(i+1)} style={{
            fontSize:32,background:"transparent",border:"none",cursor:"pointer",
            opacity:i+1===val?1:0.25,transition:"all .2s cubic-bezier(.34,1.56,.64,1)",
            transform:i+1===val?"scale(1.25)":"scale(1)",
          }}>{e}</button>
        ))}
      </div>
    );
  };

  const weekLabel=w=>{
    const d=new Date(w+"T00:00:00");
    const end=new Date(d);end.setDate(d.getDate()+6);
    return`${d.toLocaleDateString("en-ZA",{day:"numeric",month:"short"})} – ${end.toLocaleDateString("en-ZA",{day:"numeric",month:"short"})}`;
  };

  const ratingColor=r=>r>=4?"var(--acc)":r>=3?"var(--gold)":r>=2?"var(--ora)":"var(--red)";
  const energyEmoji=e=>["😴","😐","🙂","😊","🔥"][e-1]||"—";

  return(
    <div className="fu">
      {/* Header */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:"var(--acc)",marginBottom:4,letterSpacing:0.02}}>Weekly Review</div>
        <div style={{fontSize:26,fontWeight:800,letterSpacing:"-0.03em",lineHeight:1}}>Sunday Check-in</div>
        <div style={{fontSize:13,color:"var(--txt2)",marginTop:4}}>Honest. 15 minutes. Every week.</div>
      </div>

      {/* Streak + stats */}
      <div className="chips" style={{marginBottom:16}}>
        {[[streak,"Week Streak","var(--gold)"],[allReviews.length,"Reviews Done","var(--blue)"],[`${blocksPercent}%`,"This Week","var(--acc)"]].map(([v,l,c])=>(
          <div key={l} className="chip" style={{flex:1}}><div className="chip-n" style={{color:c,fontSize:20}}>{v}</div><div className="chip-l">{l}</div></div>
        ))}

      {/* Tab toggle */}
      <div className="seg-ctrl" style={{marginBottom:16}}>
        <button className={`seg-btn${view==="this"?" on":""}`} onClick={()=>setView("this")}>📝 This Week</button>
        <button className={`seg-btn${view==="history"?" on":""}`} onClick={()=>setView("history")}>📊 History</button>
      </div>

      {/* ── THIS WEEK ── */}
      {view==="this"&&(
        <div>

          <div className="card card-p" style={{marginBottom:12,background:"linear-gradient(135deg,var(--bg2),var(--sur))",borderLeft:"4px solid var(--acc)"}}>

              <div>
                <div style={{fontSize:36,fontWeight:800,letterSpacing:"-0.04em",color:blocksPercent>=70?"var(--acc)":blocksPercent>=50?"var(--gold)":"var(--red)",lineHeight:1}}>{blocksPercent}<span style={{fontSize:18,opacity:0.6}}>%</span></div>

            </div>
            <div className="pbar">
              <div className="pbar-fill" style={{width:`${blocksPercent}%`,background:blocksPercent>=70?"var(--acc)":blocksPercent>=50?"var(--gold)":"var(--red)"}}/>

            <div style={{fontSize:11,color:"var(--txt2)",marginTop:6}}>
              {weekLabel(wk)}
            </div>
